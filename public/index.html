// ─── Firebase Firestore Service (Simulated) ───
class FirestoreService{
  constructor(){this.db={};this.listeners=new Map();this.wc=0;this.rc=0;}
  async batchWrite(col,docs){
    const t0=Date.now();
    if(!this.db[col])this.db[col]={};
    docs.forEach(d=>{this.db[col][d.id]={...d.data,_ts:new Date().toISOString()}});
    this.wc+=docs.length;
    return{ok:true,count:docs.length,ms:Date.now()-t0+Math.random()*40};
  }
  async get(col,q={}){
    this.rc++;let r=Object.entries(this.db[col]||{}).map(([id,d])=>({id,...d}));
    if(q.accountId)r=r.filter(d=>d.accountId===q.accountId);
    if(q.limit)r=r.slice(0,q.limit);
    return r;
  }
  onSnapshot(col,cb){
    const id=`l_${Date.now()}_${Math.random()}`;
    this.listeners.set(id,{col,cb});
    cb(Object.entries(this.db[col]||{}).map(([id,d])=>({id,...d})));
    return()=>this.listeners.delete(id);
  }
  notify(col){
    this.listeners.forEach(({col:c,cb})=>{
      if(c===col)cb(Object.entries(this.db[col]||{}).map(([id,d])=>({id,...d})));
    });
  }
  stats(){return{writes:this.wc,reads:this.rc,cols:Object.keys(this.db).length,docs:Object.values(this.db).reduce((s,c)=>s+Object.keys(c).length,0),listeners:this.listeners.size};}
}
const FS=new FirestoreService();

// ─── Data Generators ───
const BROKERS=["IC Markets","Pepperstone","FTMO","FundedNext","Oanda","XM Global","Exness","RoboForex","FBS","Tickmill"];
const SYMBOLS=["EURUSD","GBPUSD","USDJPY","XAUUSD","GBPJPY","AUDUSD","USDCAD","NZDUSD","EURJPY","US30"];
const NAMES=["Alpha Scalper","Swing King","Grid Master","News Trader","Trend Rider","Mean Revert","Breakout Pro","Momentum X","Range Bound","Carry Trade"];

const rnd=(a,b)=>a+Math.random()*(b-a);
const fix=(v,d=2)=>+(v).toFixed(d);

const genAccounts=()=>Array.from({length:10},(_,i)=>{
  const mt5=i%3!==0, bal=rnd(5000,100000), eq=bal*rnd(.92,1.08), mgn=eq*rnd(.05,.3);
  return{
    id:`TF-${String(i+1).padStart(3,'0')}`, login:`${mt5?5:4}${100000+Math.floor(Math.random()*900000)}`,
    platform:mt5?'MT5':'MT4', broker:BROKERS[i], server:`${BROKERS[i].replace(/\s/g,'')}-Live${Math.ceil(Math.random()*5)}`,
    name:NAMES[i], currency:'USD', balance:fix(bal), equity:fix(eq), profit:fix(eq-bal),
    margin:fix(mgn), freeMargin:fix(eq-mgn), marginLevel:fix((eq/mgn)*100),
    leverage:[100,200,500,100,200,500,100,200,500,100][i],
    openPositions:Math.floor(rnd(1,9)), connected:Math.random()>.08, lastSync:new Date().toISOString(),
    winRate:fix(rnd(45,75),1), profitFactor:fix(rnd(.8,2.6)), sharpeRatio:fix(rnd(-.5,2.5)),
    maxDrawdown:fix(rnd(5,30),1), totalTrades:Math.floor(rnd(100,2000)), avgTradeTime:Math.floor(rnd(5,480)),
  };
});

const genPositions=(aid)=>Array.from({length:Math.floor(rnd(2,8))},(_,i)=>{
  const sym=SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)],type=Math.random()>.5?'BUY':'SELL';
  const vol=[.01,.05,.1,.2,.5,1][Math.floor(Math.random()*6)];
  const op=sym.includes('JPY')?rnd(140,160):sym==='XAUUSD'?rnd(2300,2400):sym==='US30'?rnd(39000,41000):rnd(.9,1.7);
  const pips=rnd(-50,50),profit=pips*vol*(sym.includes('JPY')?6.5:sym==='XAUUSD'?1:sym==='US30'?1:10);
  return{id:`pos_${aid}_${Date.now()}_${i}`,ticket:10000000+Math.floor(Math.random()*89999999),accountId:aid,
    symbol:sym,type,volume:vol,openPrice:fix(op,5),currentPrice:fix(op+(type==='BUY'?1:-1)*pips*.0001,5),
    sl:fix(op+(type==='BUY'?-1:1)*rnd(20,50)*.0001,5),tp:fix(op+(type==='BUY'?1:-1)*rnd(30,90)*.0001,5),
    profit:fix(profit),swap:fix(rnd(-5,5)),commission:fix(vol*-3.5),
    openTime:new Date(Date.now()-Math.random()*604800000).toISOString(),magic:Math.floor(Math.random()*99999),status:'open'};
});

const genDeals=(aid,n=20)=>Array.from({length:n},(_,i)=>{
  const sym=SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)];
  return{id:`deal_${aid}_${Date.now()}_${i}`,ticket:10000000+i,accountId:aid,symbol:sym,
    type:Math.random()>.5?'BUY':'SELL',volume:[.01,.05,.1,.2,.5,1][Math.floor(Math.random()*6)],
    profit:fix(rnd(-200,300)),duration:Math.round(rnd(1,480)),pips:fix(rnd(-50,50),1),
    closeTime:new Date(Date.now()-Math.random()*2592000000).toISOString()};
});

const genEquity=(days=90)=>{let eq=10000;return Array.from({length:days},(_,i)=>{
  eq+=eq*rnd(-.03,.03);const d=new Date(Date.now()-(days-i)*86400000);
  return{date:d.toLocaleDateString('en-US',{month:'short',day:'numeric'}),equity:fix(eq),balance:fix(eq+rnd(-100,100)),drawdown:fix(Math.max(0,(10000-eq)/10000*100))};
})};

const genRisk=()=>({
  conc:SYMBOLS.slice(0,6).map(s=>({symbol:s,exposure:fix(rnd(5,40)),pos:Math.floor(rnd(1,6))})),
  corr:[{pair:'EURUSD / GBPUSD',c:.85},{pair:'USDJPY / US30',c:-.62},{pair:'AUDUSD / XAUUSD',c:.71},{pair:'EURUSD / USDCAD',c:-.78}],
  flags:[
    {flag:'Revenge Trading',sev:'high',n:3,detail:'3 rapid entries after losses in GBPJPY'},
    {flag:'Overexposure',sev:'medium',n:2,detail:'JPY correlation exceeds 60% of equity'},
    {flag:'SL Widening',sev:'high',n:5,detail:'Stop-loss moved 5 times on losing positions'},
    {flag:'Weekend Hold',sev:'low',n:1,detail:'1 position held over weekend without SL'},
  ],
  dVaR:fix(rnd(2.3,5.3),1),wVaR:fix(rnd(5.1,10.1),1),maxLev:Math.floor(rnd(12,42)),
});

const genHourly=()=>Array.from({length:24},(_,h)=>({hour:`${String(h).padStart(2,'0')}:00`,trades:Math.floor(rnd(0,20)),avgProfit:fix(rnd(-30,50)),winRate:fix(rnd(30,80),1)}));
const genDaily=()=>['Mon','Tue','Wed','Thu','Fri'].map(d=>({day:d,trades:Math.floor(rnd(10,50)),profit:fix(rnd(-200,400)),winRate:fix(rnd(40,70),1)}));
const genRadar=()=>['Win Rate','Risk Mgmt','Consistency','Execution','Discipline','Profitability'].map(m=>({metric:m,value:Math.floor(rnd(25,85)),fullMark:100}));

// ─── UI Components ───
const Card=({children,style,onClick,glow})=>(
  <div onClick={onClick} style={{background:T.card,border:`1px solid ${glow?T.amber+'44':T.border}`,borderRadius:14,padding:20,cursor:onClick?'pointer':'default',transition:'all .25s cubic-bezier(.4,0,.2,1)',boxShadow:glow?`0 0 30px ${T.amberDim}`:'none',...style}}>{children}</div>
);

const Stat=({label,value,sub,color,small})=>(
  <div style={{minWidth:small?70:90}}>

const Bdg=({children,color=T.amber})=>(

);

const Dot=({on})=><span style={{display:'inline-block',width:7,height:7,borderRadius:'50%',background:on?T.green:T.red,boxShadow:`0 0 8px ${on?T.green:T.red}55`,marginRight:6}}/>;

const PTag=({p})=><Bdg color={p==='MT5'?T.cyan:T.amber}>{p}</Bdg>;

const Prog=({value,max=100,color=T.amber,h=5})=>(

const TabBar=({tabs,active,onChange})=>(
  <div style={{display:'flex',gap:3,background:T.bgSub,borderRadius:12,padding:4,marginBottom:20,overflowX:'auto',flexWrap:'nowrap'}}>
    {tabs.map(t=>(
      <button key={t.id} onClick={()=>onChange(t.id)} style={{padding:'10px 14px',borderRadius:9,border:'none',cursor:'pointer',fontSize:12,fontWeight:700,fontFamily:T.font,color:active===t.id?T.bg:T.textMut,letterSpacing:.3,background:active===t.id?`linear-gradient(135deg,${T.amber},#d97706)`:'transparent',transition:'all .2s',whiteSpace:'nowrap'}}>{t.icon} {t.label}</button>
    ))}
  </div>
);

const CTip=({active,payload,label})=>{
  if(!active||!payload?.length)return null;
  return(<div style={{background:'#1a253a',border:`1px solid ${T.border}`,borderRadius:10,padding:12,fontSize:11,fontFamily:T.mono,boxShadow:'0 8px 32px rgba(0,0,0,.4)'}}>
    <div style={{color:T.textMut,marginBottom:6,fontWeight:700,fontFamily:T.font}}>{label}</div>
    {payload.map((p,i)=><div key={i} style={{color:p.color,display:'flex',justifyContent:'space-between',gap:20,padding:'2px 0'}}><span style={{fontFamily:T.font}}>{p.name}</span><span style={{fontWeight:700}}>{typeof p.value==='number'?p.value.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}):p.value}</span></div>)}
  </div>);
};

const FSBar=({s})=>(
  <div style={{display:'flex',gap:14,alignItems:'center',padding:'7px 12px',background:T.bgSub,borderRadius:9,border:`1px solid ${T.border}`,fontSize:10,fontFamily:T.mono,flexWrap:'wrap'}}>
    <span style={{color:T.green}}>● FIRESTORE</span>
    <span style={{color:T.textMut}}>W:<span style={{color:T.amber}}>{s.writes}</span></span>
    <span style={{color:T.textMut}}>D:<span style={{color:T.cyan}}>{s.docs}</span></span>
    <span style={{color:T.textMut}}>L:<span style={{color:T.purple}}>{s.listeners}</span></span>
  </div>
);

// ─── Main App ───
function TradeForge(){
  const [accounts,setAccounts]=useState(genAccounts);
  const [selAcc,setSelAcc]=useState(null);
  const [positions,setPositions]=useState({});
  const [tab,setTab]=useState('overview');
  const [logs,setLogs]=useState([]);
  const [extracting,setExtracting]=useState(false);
  const [live,setLive]=useState(false);
  const [fsStats,setFsStats]=useState({writes:0,reads:0,cols:0,docs:0,listeners:0});
  const [eqCurve]=useState(genEquity);
  const [trades]=useState(()=>genDeals('all',50));
  const [risk]=useState(genRisk);
  const [radar]=useState(genRadar);
  const [hourly]=useState(genHourly);
  const [daily]=useState(genDaily);
  const liveRef=useRef(null);

  const addLog=useCallback((msg,type='info')=>{
    setLogs(p=>[{time:new Date().toLocaleTimeString(),msg,type,id:Date.now()+Math.random()},...p].slice(0,200));
  },[]);

  const updFS=useCallback(()=>setFsStats(FS.stats()),[]);

  useEffect(()=>{
    if(live){
      liveRef.current=setInterval(async()=>{
        setAccounts(prev=>{
          const up=prev.map(a=>{
            const d=(Math.random()-.48)*a.equity*.002;
            const ne=fix(a.equity+d);
            return{...a,equity:ne,profit:fix(ne-a.balance),freeMargin:fix(ne-a.margin),marginLevel:fix((ne/a.margin)*100),lastSync:new Date().toISOString()};
          });
          FS.batchWrite('snapshots',up.map(a=>({id:`${a.id}_${Date.now()}`,data:{accountId:a.id,ts:new Date().toISOString(),balance:a.balance,equity:a.equity,profit:a.profit,margin:a.margin}})));
          updFS();
          return up;
        });
      },2500);
      addLog('🔴 LIVE MODE — Streaming to Firestore','success');
    }else{clearInterval(liveRef.current);}
    return()=>clearInterval(liveRef.current);
  },[live,addLog,updFS]);

  // ─── Extraction Pipeline ───
  const runExtraction=useCallback(async()=>{
    setExtracting(true);setTab('extraction');
    addLog('═══════════ TRADEFORGE EXTRACTION v2.0 ═══════════','header');
    addLog('Connecting to Firebase Firestore...','info');
    await new Promise(r=>setTimeout(r,300));
    addLog('✓ Firestore connected → tradeforge-platform','firebase');
    await new Promise(r=>setTimeout(r,200));

    for(let i=0;i<accounts.length;i++){
      const a=accounts[i];
      await new Promise(r=>setTimeout(r,200));
      addLog(`──── [${i+1}/10] ${a.name} (${a.platform}) ────`,'header');
      await new Promise(r=>setTimeout(r,150));
      addLog(a.platform==='MT5'?`  mt5.initialize(login=${a.login}, server="${a.server}")`:`  MT4 EA Bridge → ${a.server}:8080/api`,'code');
      await new Promise(r=>setTimeout(r,180));

      if(!a.connected&&Math.random()>.3){
        addLog('  ⚠ Timeout — retrying...','warn');
        await new Promise(r=>setTimeout(r,250));
      }
      addLog(`  ✓ Connected to ${a.broker}`,'success');

      // Snapshot
      await new Promise(r=>setTimeout(r,80));
      addLog(`  → Balance: $${a.balance.toLocaleString()} | Equity: $${a.equity.toLocaleString()}`,'data');
      const sr=await FS.batchWrite('snapshots',[{id:`${a.id}_${Date.now()}`,data:{accountId:a.id,ts:new Date().toISOString(),balance:a.balance,equity:a.equity,profit:a.profit}}]);
      addLog(`  → Firestore: snapshots/ (${sr.ms.toFixed(0)}ms)`,'firebase');

      // Positions
      const pos=genPositions(a.id);
      setPositions(p=>({...p,[a.id]:pos}));
      const pr=await FS.batchWrite('positions',pos.map(p=>({id:p.id,data:p})));
      addLog(`  → ${pos.length} positions → Firestore: positions/ (${pr.ms.toFixed(0)}ms)`,'firebase');

      // Deals
      const deals=genDeals(a.id,Math.floor(rnd(15,35)));
      const dr=await FS.batchWrite('deals',deals.map(d=>({id:d.id,data:d})));
      addLog(`  → ${deals.length} deals → Firestore: deals/ (${dr.ms.toFixed(0)}ms)`,'firebase');

      // Risk
      await FS.batchWrite('risk_metrics',[{id:`${a.id}_${new Date().toISOString().slice(0,10)}`,data:{accountId:a.id,winRate:a.winRate,pf:a.profitFactor,dd:a.maxDrawdown}}]);
      addLog(`  → Risk metrics → Firestore: risk_metrics/`,'firebase');

      await FS.batchWrite('accounts',[{id:a.id,data:a}]);
      addLog(`  ✓ ${a.id} fully synced`,'success');
      updFS();
    }

    await new Promise(r=>setTimeout(r,200));
    addLog('═══════════ EXTRACTION COMPLETE ═══════════','header');
    const st=FS.stats();
    addLog(`✓ ${st.docs} docs across ${st.cols} collections | ${st.writes} writes`,'success');
    setExtracting(false);updFS();
  },[accounts,addLog,updFS]);

  // Computed
  const totEq=useMemo(()=>accounts.reduce((s,a)=>s+a.equity,0),[accounts]);
  const totPL=useMemo(()=>accounts.reduce((s,a)=>s+a.profit,0),[accounts]);
  const avgWR=useMemo(()=>accounts.reduce((s,a)=>s+a.winRate,0)/10,[accounts]);
  const avgPF=useMemo(()=>accounts.reduce((s,a)=>s+a.profitFactor,0)/10,[accounts]);
  const maxDD=useMemo(()=>Math.max(...accounts.map(a=>a.maxDrawdown)),[accounts]);

  const tabs=[
    {id:'overview',label:'Overview',icon:'◈'},
    {id:'accounts',label:'Accounts',icon:'◉'},
    {id:'positions',label:'Positions',icon:'▲'},
    {id:'risk',label:'Risk Intel',icon:'◆'},
    {id:'performance',label:'Performance',icon:'⚡'},
    {id:'behavioral',label:'Behavioral',icon:'◎'},
    {id:'firestore',label:'Firestore',icon:'🔥'},
    {id:'extraction',label:'Extraction',icon:'⟐'},
  ];

  return(
  <div style={{background:T.bg,minHeight:'100vh',color:T.text,fontFamily:T.font}}>
    {/* HEADER */}
    <div style={{background:`linear-gradient(180deg,${T.bgSub} 0%,${T.bg} 100%)`,borderBottom:`1px solid ${T.border}`,padding:'14px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
      <div style={{display:'flex',alignItems:'center',gap:14}}>
        <div style={{width:44,height:44,borderRadius:12,background:`linear-gradient(135deg,${T.amber},#b45309)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,fontWeight:900,color:'#000',fontFamily:T.mono}}>TF</div>
        <div>
          <div style={{fontSize:20,fontWeight:900,letterSpacing:-.7}}>TRADE<span style={{color:T.amber}}>FORGE</span></div>
          <div style={{fontSize:9,color:T.textMut,letterSpacing:2,textTransform:'uppercase',fontFamily:T.mono}}>Risk Intelligence • Firebase Firestore</div>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
        <FSBar s={fsStats}/>
        <div onClick={()=>setLive(!live)} style={{display:'flex',alignItems:'center',gap:7,padding:'8px 14px',borderRadius:9,background:live?T.redDim:T.bgSub,border:`1px solid ${live?T.red+'55':T.border}`,cursor:'pointer',transition:'all .2s',userSelect:'none'}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:live?T.red:T.textMut,animation:live?'pulse 1.5s infinite':'none'}}/>
          <span style={{fontSize:11,fontWeight:800,color:live?T.red:T.textMut,fontFamily:T.mono}}>{live?'LIVE':'PAUSED'}</span>
        </div>
        <button onClick={runExtraction} disabled={extracting} style={{padding:'10px 20px',borderRadius:9,border:'none',background:extracting?T.textMut:`linear-gradient(135deg,${T.amber},#b45309)`,color:'#000',fontWeight:800,fontSize:12,cursor:extracting?'not-allowed':'pointer',letterSpacing:.5,animation:!extracting?'glow 3s infinite':'none'}}>
          {extracting?'⏳ EXTRACTING...':'⚡ EXTRACT → FIRESTORE'}
        </button>
      </div>
    </div>

    <div style={{padding:'20px 20px',maxWidth:1500,margin:'0 auto'}}>
      <div style={{overflowX:'auto'}}><TabBar tabs={tabs} active={tab} onChange={setTab}/></div>

import { initializeApp } from 'firebase/app';
import { getFirestore, collection, doc, writeBatch,
  onSnapshot, query, where, orderBy, limit,
  Timestamp } from 'firebase/firestore';

const app = initializeApp({
  projectId: "tradeforge-platform",
  apiKey: "AIza...",
});
const db = getFirestore(app);

// Batch write positions after extraction
export async function writePositions(uid, positions) {
  const batch = writeBatch(db);
  positions.forEach(pos => {
    const ref = doc(db, \`users/\${uid}/positions\`, \`\${pos.ticket}\`);
    batch.set(ref, { ...pos, lastUpdated: Timestamp.now() });
  });
  await batch.commit(); // max 500 per batch
}

// Real-time dashboard listener
export function subscribePositions(uid, callback) {
  const q = query(
    collection(db, \`users/\${uid}/positions\`),
    where('status', '==', 'open'),
    orderBy('profit', 'desc')
  );
  return onSnapshot(q, snap => {
    callback(snap.docs.map(d => ({ id: d.id, ...d.data() })));
  });
}

//         && request.auth.uid == userId;
